<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>תיקי בתי הספר · הופה</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --pink:#E8348A; --pink-dark:#c02673; --pink-soft:#fde7f2;
    --yellow:#FFF200; --yellow-soft:#fffbcc;
    --ink:#2b2b33; --muted:#8a8a95; --line:#ece7ef;
    --bg:#f6f2f7; --card:#ffffff;
    --blue:#3b82f6; --blue-d:#1d4ed8;
    --green:#22b573; --green-soft:#e6f8ef;
    --amber:#F5A623; --red:#e5484d;
    --shadow:0 4px 18px rgba(43,43,51,.07);
    --shadow-lg:0 12px 40px rgba(43,43,51,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Rubik',system-ui,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  a{color:var(--pink-dark);text-decoration:none}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#d9d2de;border-radius:20px}

  /* ===== Gate ===== */
  #gate{position:fixed;inset:0;background:linear-gradient(135deg,var(--pink),var(--pink-dark));z-index:200;display:grid;place-items:center;padding:20px}
  .gatebox{background:#fff;border-radius:22px;padding:30px 26px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);text-align:center}
  .gatebox .lg{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;display:block;object-fit:contain;background:var(--yellow);padding:8px}
  .gatebox h1{margin:0 0 4px;font-size:22px;font-weight:800}
  .gatebox p{margin:0 0 18px;color:var(--muted);font-size:14px}
  .gatebox input{width:100%;padding:14px;border:2px solid var(--pink);border-radius:13px;font-size:17px;text-align:center;direction:ltr;outline:none}
  .gatebox button{width:100%;margin-top:12px;background:var(--pink);color:#fff;font-weight:800;font-size:16px;padding:13px;border-radius:13px}
  .gatebox .err{color:var(--red);font-size:13px;font-weight:700;height:18px;margin-top:8px}

  /* ===== Header ===== */
  header.app{background:linear-gradient(120deg,var(--pink) 0%,var(--pink-dark) 100%);color:#fff;padding:12px 0;box-shadow:var(--shadow);position:sticky;top:0;z-index:40}
  .head-in{max-width:1300px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:11px;flex:1;min-width:180px}
  .logo{width:40px;height:40px;border-radius:12px;background:#fff;display:grid;place-items:center;overflow:hidden;box-shadow:0 4px 14px rgba(0,0,0,.18)}
  .logo img{width:100%;height:100%;object-fit:contain;padding:4px}
  .brand h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.3px}
  .brand .sub{font-size:12px;opacity:.9;font-weight:500}
  .syncst{font-size:12px;font-weight:700;background:rgba(255,255,255,.18);padding:6px 12px;border-radius:999px;white-space:nowrap}
  .syncst.ok{background:rgba(34,181,115,.9)}
  .syncst.off{background:rgba(0,0,0,.22)}
  .syncst.busy{background:rgba(245,166,35,.9)}
  .menubtn{background:rgba(255,255,255,.16);border-radius:11px;padding:8px 12px;font-weight:800;font-size:14px;display:none}

  .shell{max-width:1300px;margin:0 auto;display:flex;gap:20px;padding:18px 16px 90px;align-items:flex-start}

  /* ===== Sidebar ===== */
  aside.schools{width:270px;flex:none;position:sticky;top:78px;background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:13px;display:flex;flex-direction:column;gap:9px;max-height:calc(100vh - 96px)}
  aside .stitle{font-size:15px;font-weight:800;display:flex;align-items:center;gap:7px}
  aside .stitle .cnt{margin-inline-start:auto;font-size:12px;font-weight:700;color:var(--muted)}
  .ssearch{position:relative}
  .ssearch input{width:100%;padding:9px 34px 9px 12px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:13.5px;outline:none}
  .ssearch input:focus{border-color:var(--pink)}
  .ssearch .mag{position:absolute;inset-inline-end:11px;top:50%;transform:translateY(-50%);opacity:.4;font-size:13px}
  .sfilters{display:flex;gap:5px;flex-wrap:wrap}
  .sfilters button{font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:999px;background:#f4f2f6;color:#75757f;border:1.5px solid transparent}
  .sfilters button.active{background:var(--pink);color:#fff}
  .slist{display:flex;flex-direction:column;gap:4px;overflow-y:auto;margin-inline-end:-6px;padding-inline-end:6px}
  .srow{display:flex;align-items:center;gap:10px;padding:10px 11px;border-radius:12px;transition:.13s;text-align:start;width:100%}
  .srow:hover{background:var(--pink-soft)}
  .srow.active{background:var(--pink);color:#fff}
  .srow .dot{width:10px;height:10px;border-radius:50%;flex:none}
  .srow .nm{font-weight:700;font-size:13.5px;line-height:1.2}
  .srow .cy{font-size:11px;color:var(--muted);font-weight:500}
  .srow.active .cy{color:rgba(255,255,255,.85)}
  .srow .st{margin-inline-start:auto;font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;white-space:nowrap;background:#f0edf3;color:#75757f}
  .srow.active .st{background:rgba(255,255,255,.25)!important;color:#fff!important}

  main.content{flex:1;min-width:0}

  /* ===== School header ===== */
  .sc-head{border-radius:20px;padding:20px 22px;color:#fff;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
  .sc-head::after{content:"";position:absolute;inset-inline-start:-40px;bottom:-60px;width:200px;height:200px;background:rgba(255,255,255,.09);border-radius:50%}
  .sc-head .row1{display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:relative}
  .sc-head h2{margin:0;font-size:25px;font-weight:800;letter-spacing:-.4px}
  .sc-head .badge-st{font-size:12.5px;font-weight:800;padding:5px 13px;border-radius:999px;background:rgba(255,255,255,.22)}
  .sc-head .meta{font-size:13.5px;opacity:.95;font-weight:500;margin-top:5px;position:relative}
  .sc-head .share{margin-inline-start:auto;display:flex;gap:8px;position:relative;flex-wrap:wrap}
  .sharebtn{background:#fff;color:var(--pink-dark);font-weight:800;font-size:13px;padding:9px 14px;border-radius:12px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,.15);transition:.14s}
  .sharebtn:hover{transform:translateY(-1px)}
  .sharebtn.ghost{background:rgba(255,255,255,.18);color:#fff;box-shadow:none}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0 2px;position:relative}
  .kpi{background:rgba(255,255,255,.16);border-radius:14px;padding:11px 13px}
  .kpi .n{font-size:22px;font-weight:800;line-height:1}
  .kpi .l{font-size:11.5px;font-weight:600;opacity:.92;margin-top:3px}

  /* ===== Tabs ===== */
  .tabs{display:flex;gap:7px;flex-wrap:wrap;margin:16px 0 12px}
  .tabs button{background:var(--card);border-radius:12px;padding:9px 14px;font-weight:700;font-size:13.5px;box-shadow:var(--shadow);display:flex;align-items:center;gap:7px;transition:.13s;border:1.5px solid transparent}
  .tabs button:hover{border-color:var(--pink-soft)}
  .tabs button.active{background:linear-gradient(120deg,var(--pink),var(--pink-dark));color:#fff}
  .tabs button .cnt{font-size:11px;font-weight:800;background:rgba(0,0,0,.08);border-radius:999px;padding:1px 7px}
  .tabs button.active .cnt{background:rgba(255,255,255,.25)}

  .pane{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}}

  /* ===== Cards ===== */
  .card{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
  .card h3{margin:0 0 12px;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
  .card h3 .sub{font-size:12px;font-weight:600;color:var(--muted);margin-inline-start:auto}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
  .field label{font-size:12px;font-weight:700;color:var(--muted)}
  .field input,.field textarea,.field select{padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;outline:none;background:#fff;width:100%}
  .field input:focus,.field textarea:focus{border-color:var(--pink)}
  .field textarea{resize:vertical;min-height:64px}
  .detail-row{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .detail-row:last-child{border-bottom:none}
  .detail-row .k{color:var(--muted);font-weight:600}
  .detail-row .v{font-weight:700;text-align:end}

  .btn{padding:9px 14px;border-radius:11px;font-weight:800;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;transition:.13s}
  .btn.primary{background:var(--pink);color:#fff}
  .btn.primary:hover{background:var(--pink-dark)}
  .btn.ghost{background:#f4f2f6;color:#5a5a63}
  .btn.ghost:hover{background:#ece7ef}
  .btn.wa{background:#25D366;color:#fff}
  .btn.mail{background:var(--blue);color:#fff}
  .btn.call{background:#eef3ff;color:var(--blue-d)}
  .btn.small{padding:6px 11px;font-size:12.5px;border-radius:9px}
  .btn.danger{background:#fdecec;color:var(--red)}

  /* Contacts */
  .contact{border:1.5px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:10px}
  .contact .top{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .contact .g{font-weight:800;font-size:14.5px}
  .contact .t{font-size:12.5px;color:var(--muted);margin-top:2px}
  .contact .nm{font-size:13px;font-weight:600;margin-top:6px}
  .contact .note{font-size:12px;background:var(--yellow-soft);border-radius:8px;padding:6px 9px;margin-top:7px;color:#7a6a00}
  .contact .acts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .addr{direction:ltr;font-weight:600;background:#eef3ff;border-radius:7px;padding:2px 8px;font-size:12px;color:var(--blue-d)}
  .lead-card{border:1.5px solid var(--pink-soft);background:var(--pink-soft);border-radius:13px;padding:12px 14px;margin-bottom:10px}
  .grouplink{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#fff;border-radius:9px;margin-top:6px;font-size:13px;font-weight:600}

  /* List items (non-responders / issues / manim / docs) */
  .litem{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px;background:#fff}
  .litem .x{margin-inline-start:auto;color:var(--muted);font-size:16px;flex:none}
  .litem .meta{font-size:11.5px;color:var(--muted);margin-top:3px}
  .litem.flag{border-color:#f6d5a8;background:#fff9ef}
  .addline{display:flex;gap:8px;margin-top:8px}
  .addline input,.addline textarea{flex:1;padding:9px 11px;border:1.5px solid var(--line);border-radius:10px;font-size:13.5px;outline:none}
  .addline input:focus{border-color:var(--pink)}

  .empty{text-align:center;color:var(--muted);font-size:13.5px;padding:22px 10px}
  .filerow{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--line);border-radius:11px;margin-bottom:8px}
  .filerow .ic{width:34px;height:34px;border-radius:9px;background:var(--pink-soft);display:grid;place-items:center;flex:none;font-size:16px}
  .filerow .fn{font-weight:700;font-size:13.5px;word-break:break-word}
  .filerow .fm{font-size:11.5px;color:var(--muted)}
  .drop{border:2px dashed var(--pink);border-radius:14px;padding:20px;text-align:center;background:var(--pink-soft);cursor:pointer;transition:.15s}
  .drop:hover{background:#fbd9ea}
  .drop.over{background:#f9c9e2}
  .bar{height:9px;border-radius:99px;background:#eee;overflow:hidden;margin-top:6px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--pink),var(--pink-dark));border-radius:99px}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#2b2b33;color:#fff;padding:12px 22px;border-radius:14px;font-weight:700;font-size:14px;box-shadow:var(--shadow-lg);opacity:0;transition:.28s;z-index:120}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .toast.bad{background:var(--red)}
  .toast.good{background:var(--green)}

  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none}
  .backdrop.show{display:block}

  @media(max-width:880px){
    .shell{flex-direction:column;padding:14px 12px 90px}
    aside.schools{width:100%;position:relative;top:0;max-height:none;order:-1}
    .slist{max-height:280px}
    .grid2{grid-template-columns:1fr}
    .kpis{grid-template-columns:repeat(2,1fr)}
    .menubtn{display:block}
    aside.schools.collapsed .slist,aside.schools.collapsed .ssearch,aside.schools.collapsed .sfilters{display:none}
    .sc-head .share{width:100%;margin-top:8px}
  }
</style>
</head>

<!-- ===== Password gate ===== -->
<div id="gate">

      </div>
    </div>
    <div class="syncst" id="syncst">☁️ מתחבר…</div>
  </div>
</header>

<div class="shell" id="shell" style="display:none">
  <aside class="schools">
    <div class="stitle">🏫 בתי ספר <span class="cnt" id="scount"></span></div>
    <div class="ssearch"><input id="ssearch" placeholder="חיפוש בי״ס / עיר…" oninput="onSearch(this.value)"><span class="mag">🔍</span></div>

  </aside>
  <main class="content" id="content"></main>
</div>

<div class="backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="toast" id="toast"></div>

function blank(){return{coord:{name:'',role:'רכז/ת בוגרים',phone:'',mail:''},mapping:{total:'',responded:''},nonResp:[],issues:[],docs:[],manim:[],files:[],msgs:[]};}
function D(){ if(!STORE[curKey]) STORE[curKey]=blank(); const d=STORE[curKey];
  d.coord=d.coord||blank().coord; ['nonResp','issues','docs','manim','files','msgs'].forEach(k=>d[k]=d[k]||[]); d.mapping=d.mapping||{total:'',responded:''}; return d; }

function setSync(msg,cls){const el=$('#syncst');if(el){el.textContent=msg;el.className='syncst'+(cls?' '+cls:'');}}

async function pullAll(){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TABLE}?select=school_key,data`,{headers:SB_HEAD});
    if(!r.ok){setSync('☁️ לא זמין — מקומי','off');return;}
    const rows=await r.json();
    rows.forEach(row=>{STORE[row.school_key]=Object.assign(blank(),row.data||{});});
    localStorage.setItem('hopa_dossier',JSON.stringify(STORE));
    setSync('☁️ מסונכרן ✓','ok');
  }catch(e){setSync('☁️ לא מקוון — מקומי','off');
    try{STORE=JSON.parse(localStorage.getItem('hopa_dossier'))||{};}catch(_){}}
}
const pushTimers={};
function save(){ localStorage.setItem('hopa_dossier',JSON.stringify(STORE)); const key=curKey;
  clearTimeout(pushTimers[key]); pushTimers[key]=setTimeout(()=>push(key),700); }
async function push(key){
  const body=[{school_key:key,data:STORE[key]||blank(),updated_at:new Date().toISOString()}];
  setSync('☁️ שומר…','busy');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/${TABLE}?on_conflict=school_key`,{method:'POST',
      headers:Object.assign({},SB_HEAD,{Prefer:'resolution=merge-duplicates,return=minimal'}),body:JSON.stringify(body)});
    if(!r.ok) throw 0; setSync('☁️ מסונכרן ✓','ok');
  }catch(e){setSync('☁️ נשמר מקומית','off');}
}

        <div class="kpi"><div class="n">${notResp>0?notResp:0}</div><div class="l">בוגרים שטרם ענו</div></div>

        <div class="kpi"><div class="n">${d.manim.length}</div><div class="l">מענים לבית הספר</div></div>

function shade(hex){ /* מכהה צבע לכותרת */ try{let n=parseInt(hex.slice(1),16),r=(n>>16)-30,g=((n>>8)&255)-30,b=(n&255)-30; r=Math.max(0,r);g=Math.max(0,g);b=Math.max(0,b); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}catch(e){return hex;} }

}

    (lead.groups||[]).forEach(g=>html+=`<div class="grouplink">📢 <span style="flex:1">${esc(g.name)}</span><a class="btn ghost small" target="_blank" href="${esc(g.u)}">↗</a></div>`);

      <a class="btn ghost small" target="_blank" href="https://www.google.com/search?q=${encodeURIComponent('chat.whatsapp.com דרושים "'+s.city+'"')}">חפש ↗</a></div>`;
    html+=`</div>`;
  }
  /* גורמים אזוריים מפורטים */
  if(reg){
    html+=`<div class="card"><h3>📇 גורמים קהילתיים באזור <span class="sub">${esc(reg.region)}</span></h3>`;
    if(reg.note) html+=`<div class="contact note" style="margin-bottom:10px">${esc(reg.note)}</div>`;
    reg.items.forEach(it=>{
      html+=`<div class="contact"><div class="top"><span class="g">${esc(it.g)}</span></div>
        ${it.t?`<div class="t">${esc(it.t)}</div>`:''}
        ${it.nm?`<div class="nm">👤 ${esc(it.nm)}</div>`:''}
        ${it.em?`<div style="margin-top:6px"><span class="addr">${esc(it.em)}</span>${it.em2?` <span class="addr">${esc(it.em2)}</span>`:''}</div>`:''}
        ${it.note?`<div class="note">${esc(it.note)}</div>`:''}
        <div class="acts">
          ${it.ph?`<a class="btn call small" href="tel:${esc(it.ph)}">📞 ${esc(it.ph)}</a>
            <a class="btn wa small" target="_blank" href="https://wa.me/${waNum(it.ph)}?text=${encodeURIComponent('שלום, מדברת מיטל פלג מתוכנית הבוגרים הופה (רשת אורט). אנחנו מלווים בוגרי '+s.school+' ב'+s.city+' ומחפשים שיתוף פעולה מול '+it.g+'.')}">🟢 וואטסאפ</a>`:''}
          ${it.ph2?`<a class="btn call small" href="tel:${esc(it.ph2)}">📞 ${esc(it.ph2)}</a>`:''}
          ${it.em?`<a class="btn mail small" href="mailto:${esc(it.em)}?subject=${encodeURIComponent('תוכנית הבוגרים הופה — '+s.school)}">✉️ מייל</a>`:''}
        </div></div>`;
    });
    html+=`</div>`;
  }
  if(!lead && !reg) html=`<div class="card"><div class="empty">טרם מופו גורמים קהילתיים לבית ספר זה.<br>אפשר להוסיף ידנית בלשונית „תיעוד פניות".</div></div>`;
  return html;
}

/* ---------- 4) קבצים ---------- */
function tabFiles(s,d){
  return `
  <div class="card">
    <h3>⬆️ העלאת קבצים לתיק <span class="sub">רשימות בוגרים · תיעוד · מסמכים</span></h3>
    <div class="drop" id="drop" onclick="$('#fileIn').click()"
      ondragover="event.preventDefault();this.classList.add('over')" ondragleave="this.classList.remove('over')"
      ondrop="event.preventDefault();this.classList.remove('over');handleFiles(event.dataTransfer.files)">
      📤 <b>גררי לכאן</b> או לחצי לבחירת קובץ<br>
      <span style="font-size:12px;color:var(--muted)">רשימת בוגרים (Excel), תיעוד פנייה, כל מסמך — נשמר בענן ומשותף</span>
    </div>
    <input id="fileIn" type="file" multiple style="display:none" onchange="handleFiles(this.files)">
    <div id="upBar" style="margin-top:10px"></div>
    <div style="margin-top:12px">
      ${d.files.length?d.files.map(f=>`<div class="filerow">
        <div class="ic">${fileIcon(f.name)}</div>
        <div style="flex:1;min-width:0"><div class="fn">${esc(f.name)}</div><div class="fm">${esc(f.at||'')}${f.size?' · '+fmtSize(f.size):''}</div></div>
        <a class="btn ghost small" target="_blank" href="${esc(f.url)}">פתיחה ↗</a>
        <span class="x" onclick="delFile('${f.id}')" style="cursor:pointer;color:var(--muted)">✕</span></div>`).join('')
        :'<div class="empty">עדיין לא הועלו קבצים לתיק זה.</div>'}
    </div>
  </div>

  <div class="card">
    <h3>📚 חומרים כלליים של התוכנית <span class="sub">מתיקיית ההורדות</span></h3>
    <div style="font-size:12.5px;color:var(--muted);margin-bottom:10px">קישורים נפתחים מהמחשב שלך (כשהאתר מופעל מקומית). כדי שיהיו זמינים גם בנייד — העלי אותם דרך האזור למעלה.</div>
    ${GENERAL_FILES.map(f=>`<div class="filerow">
      <div class="ic">${f.ic}</div>
      <div style="flex:1;min-width:0"><div class="fn">${esc(f.n)}</div></div>
      <a class="btn ghost small" href="${DL_BASE}${encodeURIComponent(f.f)}" target="_blank">פתיחה ↗</a></div>`).join('')}
  </div>`;
}
function fileIcon(n){ n=(n||'').toLowerCase(); if(/\.(xlsx?|csv)$/.test(n))return'📊'; if(/\.pdf$/.test(n))return'📕'; if(/\.docx?$/.test(n))return'📄'; if(/\.(png|jpe?g|gif|webp)$/.test(n))return'🖼️'; if(/\.zip$/.test(n))return'🗜️'; return'📎'; }
function fmtSize(b){ return b>1e6?(b/1e6).toFixed(1)+'MB':Math.max(1,Math.round(b/1024))+'KB'; }

/* ---------- 5) תיעוד פניות ---------- */

    <div class="addline">

function addDoc(){ const el=$('#docIn'),v=el.value.trim(); if(!v)return; D().docs.unshift({id:uid(),text:v,at:nowStr()}); save(); renderSchool(); toast('תועד'); }

function addManeh(){ const name=$('#mnName').value.trim(); if(!name){toast('חסר שם מענה','bad');return;} D().manim.unshift({id:uid(),name,cat:$('#mnCat').value,link:$('#mnLink').value.trim(),note:$('#mnNote').value.trim(),at:nowStr()}); save(); renderSchool(); toast('המענה נוסף'); }

/* ---------- 7) הודעות ---------- */
function tabMsg(s,d){
  const c=d.coord;
  return `
  <div class="card">
    <h3>📣 שליחת הודעה <span class="sub">לצוות בית הספר או לבוגרים</span></h3>
    <div class="field"><label>נמען</label>
      <select id="msgTo" onchange="msgToChanged()">
        <option value="coord">רכז/ת הבוגרים${c.name?' · '+esc(c.name):''}</option>
        <option value="alumni">בוגר/ת (הזיני מספר)</option>
        <option value="broadcast">קבוצת בוגרים (וואטסאפ)</option>
      </select></div>
    <div class="field" id="msgNumWrap" style="display:none"><label>מספר טלפון</label><input id="msgNum" placeholder="05X-XXXXXXX" inputmode="tel" style="direction:ltr;text-align:left"></div>
    <div class="field"><label>תוכן ההודעה</label>
      <textarea id="msgTxt" rows="4">${esc(defaultMsg(s))}</textarea></div>

      <button class="btn wa" onclick="sendWa()">🟢 שליחה בוואטסאפ</button>

      <button class="btn ghost" onclick="copyMsg()">📋 העתקה</button>
    </div>
  </div>
  <div class="card">
    <h3>🕓 יומן הודעות שנשלחו <span class="sub">${d.msgs.length}</span></h3>
    ${d.msgs.length?d.msgs.map(x=>`<div class="litem"><span style="flex:1">${x.via==='wa'?'🟢':'✉️'} <b>${esc(x.to)}</b><div class="meta">${esc(x.at)} · ${esc(x.text).slice(0,70)}…</div></span>
      <span class="x" onclick="delItem('msgs','${x.id}')">✕</span></div>`).join(''):'<div class="empty">טרם נשלחו הודעות מהתיק.</div>'}

function defaultMsg(s){ return 'היי 💗 כאן מיטל מתוכנית הבוגרים של הופה ('+s.school+'). '; }
function msgToChanged(){ const v=$('#msgTo').value; $('#msgNumWrap').style.display=(v==='coord')?'none':''; }
function msgTarget(){ const v=$('#msgTo').value,d=D(); if(v==='coord')return d.coord.phone||''; return ($('#msgNum').value||'').trim(); }
function logMsg(via,to,text){ D().msgs.unshift({id:uid(),via,to,text,at:nowStr()}); save(); }
function sendWa(){ const num=msgTarget(),txt=$('#msgTxt').value; const to=$('#msgTo').value==='coord'?(D().coord.name||'רכז'):(num||'קבוצה');
  if($('#msgTo').value==='broadcast'||!num){ window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank'); }
  else window.open('https://wa.me/'+waNum(num)+'?text='+encodeURIComponent(txt),'_blank');
  logMsg('wa',to,txt); renderSchool(); toast('נפתח וואטסאפ'); }
function sendMail(){ const txt=$('#msgTxt').value,to=D().coord.mail||''; window.open('mailto:'+to+'?subject='+encodeURIComponent('הופה · '+cur().school)+'&body='+encodeURIComponent(txt)); logMsg('mail',to||'מייל',txt); renderSchool(); }
function copyMsg(){ navigator.clipboard.writeText($('#msgTxt').value).then(()=>toast('הועתק ✓','good')); }

/* ======================================================================
   העלאת קבצים ל-Supabase Storage
   ====================================================================== */
async function handleFiles(fileList){
  const files=[...fileList]; if(!files.length)return;
  for(const file of files){ await uploadOne(file); }
  $('#fileIn').value='';
}
async function uploadOne(file){
  const bar=$('#upBar'); const rid=uid();
  bar.insertAdjacentHTML('beforeend',`<div id="${rid}" style="font-size:12.5px;font-weight:700;margin-bottom:4px">⏳ מעלה ${esc(file.name)}…</div>`);
  const safe=file.name.replace(/[^\w.\-֐-׿]/g,'_');
  const path=`${curKey}/${Date.now()}_${safe}`;
  try{
    const r=await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${encodeURI(path)}`,{
      method:'POST', headers:{apikey:SB_KEY,Authorization:'Bearer '+SB_KEY,'x-upsert':'true'}, body:file});
    if(!r.ok) throw new Error(await r.text());
    const url=`${SB_URL}/storage/v1/object/public/${BUCKET}/${encodeURI(path)}`;
    D().files.unshift({id:uid(),name:file.name,url,path,size:file.size,at:nowStr()});
    save(); document.getElementById(rid).remove(); renderSchool(); toast('הקובץ הועלה ✓','good');
  }catch(e){ document.getElementById(rid).innerHTML='❌ נכשלה העלאת '+esc(file.name)+' — ודאי שהרצת את קובץ ה-SQL להקמה'; }
}
async function delFile(id){ const f=D().files.find(x=>x.id===id); if(!f)return; if(!confirm('למחוק את הקובץ "'+f.name+'"?'))return;
  try{ if(f.path) await fetch(`${SB_URL}/storage/v1/object/${BUCKET}/${encodeURI(f.path)}`,{method:'DELETE',headers:SB_HEAD}); }catch(e){}
  D().files=D().files.filter(x=>x.id!==id); save(); renderSchool(); }

/* ======================================================================
   שיתוף / הדפסת תיק בודד
   ====================================================================== */
function shareDossier(){
  const s=cur(),d=D(),pct=mapPct(d);
  const link=location.origin+location.pathname+'#'+s.id;
  let txt=`📁 תיק בית ספר · ${s.school} (${s.city})\n`;
  txt+=`מסלול: ${s.track==='vet'?'ותיק':'מצטרף'} · אוכלוסייה: ${s.sector}\n`;
  if(d.coord.name) txt+=`רכז/ת בוגרים: ${d.coord.name}${d.coord.phone?' · '+d.coord.phone:''}\n`;
  if(+d.mapping.total) txt+=`מיפוי בוגרים: ${pct}% הושלם (${d.mapping.responded||0}/${d.mapping.total})\n`;
  if(d.issues.length) txt+=`בעיות פתוחות: ${d.issues.length}\n`;
  if(d.manim.length) txt+=`מענים: ${d.manim.length}\n`;
  txt+=`\n🔗 לתיק המלא: ${link}\n— תוכנית הבוגרים הופה · ${HOPA_SITE}`;
  if(navigator.share){ navigator.share({title:'תיק '+s.school,text:txt}).catch(()=>{}); }
  else { window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank'); }
  try{navigator.clipboard.writeText(txt);}catch(e){}
  toast('סיכום התיק מוכן לשיתוף ✓','good');
}
function printDossier(){
  const s=cur(),d=D(),pct=mapPct(d),di=CONTACTS_FOR[s.id],reg=(di!=null)?DATA[di]:null,lead=LEADS[s.id];
  const w=window.open('','_blank');
  const sec=(t,h)=>h?`<h2 style="color:#c02673;border-bottom:2px solid #fde7f2;padding-bottom:4px">${t}</h2>${h}`:'';
  let contacts='';
  if(reg) contacts=reg.items.map(it=>`<p><b>${it.g}</b>${it.nm?' · '+it.nm:''}${it.ph?' · '+it.ph:''}${it.em?' · '+it.em:''}</p>`).join('');
  let groups=''; if(lead){ if(lead.youth)groups+=`<p>🏢 ${lead.youth.name}</p>`; (lead.groups||[]).forEach(g=>groups+=`<p>📢 ${g.name}</p>`);}
  w.document.write(`<!doctype html><html dir="rtl" lang="he"><head><meta charset="utf-8"><title>תיק ${s.school}</title>
    <style>body{font-family:Arial,sans-serif;max-width:800px;margin:24px auto;padding:0 18px;color:#2b2b33;line-height:1.6}
    h1{color:#E8348A} h2{margin-top:22px;font-size:18px} p{margin:4px 0} .box{background:#fde7f2;border-radius:10px;padding:12px 16px;margin:10px 0}</style></head><body>
    <h1>📁 תיק בית ספר · ${s.school}</h1>
    <div class="box"><b>${s.city}</b>${s.area?' · '+s.area:''} · ${s.sector} · ${s.track==='vet'?'ותיק':'מצטרף'}</div>
    ${sec('רכז/ת בוגרים', d.coord.name?`<p><b>${d.coord.name}</b> · ${d.coord.role}</p><p>${d.coord.phone||''} ${d.coord.mail||''}</p>`:'<p>—</p>')}
    ${sec('מיפוי בוגרים', +d.mapping.total?`<p>${pct}% הושלם · ${d.mapping.responded||0} מתוך ${d.mapping.total} ענו · ${(d.mapping.total-d.mapping.responded)||0} טרם ענו</p>`:'')}
    ${sec('בוגרים שטרם ענו', d.nonResp.length?d.nonResp.map(x=>`<p>👤 ${x.name} ${x.phone||''}</p>`).join(''):'')}
    ${sec('בעיות ובקשות', d.issues.length?d.issues.map(x=>`<p>🔸 ${x.text}${x.done?' (טופל)':''}</p>`).join(''):'')}
    ${sec('מרכז צעירים וקבוצות', groups)}
    ${sec('גורמים קהילתיים', contacts)}
    ${sec('מענים', d.manim.length?d.manim.map(x=>`<p>✨ ${x.name} · ${x.cat}${x.note?' · '+x.note:''}</p>`).join(''):'')}
    ${sec('תיעוד פניות', d.docs.length?d.docs.map(x=>`<p>📝 ${x.at}: ${x.text}</p>`).join(''):'')}
    <hr><p style="color:#888">תוכנית הבוגרים הופה · ${HOPA_SITE}</p>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

/* ======================================================================
   עזרי תצוגה + אתחול
   ====================================================================== */
function waNum(ph){ let n=(ph||'').replace(/\D/g,''); if(n.startsWith('0'))n='972'+n.slice(1); else if(!n.startsWith('972')&&n.length<=10)n='972'+n; return n; }
let toastT;
function toast(msg,cls){ const el=$('#toast'); el.textContent=msg; el.className='toast show'+(cls?' '+cls:''); clearTimeout(toastT); toastT=setTimeout(()=>el.className='toast',1900); }
function closeSheet(){ $('#backdrop').classList.remove('show'); }

async function boot(){
  await pullAll();
  const h=location.hash.replace('#',''); if(h && SCHOOLS.find(s=>s.id===h)) curKey=h;
  renderList(); renderSchool();
  /* רענון עדין כשחוזרים לטאב */
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ pullAll().then(()=>renderSchool()); } });
  setInterval(()=>{ if(!document.hidden) pullAll(); }, 20000);
}

/* אם כבר נכנסת בעבר במכשיר הזה — דלגי על השער */
if(localStorage.getItem('hopa_gate')==='1'){
  $('#gate').style.display='none'; $('#appHead').style.display=''; $('#shell').style.display=''; boot();
}
